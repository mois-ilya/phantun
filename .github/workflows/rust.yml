name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    - name: Run lint
      run: cargo clippy --verbose
    - name: Build
      run: cargo build --verbose
    - name: Unit tests
      run: cargo test --workspace

  integration:

    runs-on: ubuntu-latest
    # Note: --privileged is required for network namespace creation.
    # GitHub Actions ubuntu-latest runners support privileged Docker containers.

    steps:
    - uses: actions/checkout@v5
    - name: Build integration test image
      run: docker build -f Dockerfile.test -t phantun-test .
    - name: Run integration tests
      run: docker run --privileged phantun-test
