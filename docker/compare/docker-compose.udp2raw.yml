# Local compare harness — udp2raw side (baseline).
# See docs/plans/20260416-local-compare-harness.md.
#
# This file mirrors docker-compose.phantun.yml one-to-one: same subnet
# (100.64.240.0/24), same IPs, same echo backend, same iperf3 generator, same
# capturer sidecar. Only the tunnel implementation changes — phantun's
# client/server binaries are swapped for udp2raw in FakeTCP mode.
#
# Usage:
#   docker compose -f docker/compare/docker-compose.udp2raw.yml up --build \
#     --abort-on-container-exit --exit-code-from generator || true
#
# The harness is intended to be brought up one implementation at a time; the
# network object (`udp2raw-compare`) is distinct from phantun's so parallel
# runs don't clash if someone ever tries.

name: udp2raw-compare

services:
  # Python UDP echo (matches phantun-compose verbatim): strict 1-in/1-out via
  # SOCK_DGRAM. Replaced socat+cat to avoid socat's pipe-based merge artifacts.
  udp-echo:
    image: python:3.12-alpine
    container_name: udp2raw-compare-udp-echo
    environment:
      UDP_ECHO_PORT: "${UDP_ECHO_PORT:-5000}"
    command:
      - sh
      - -c
      - |
        exec python3 -u -c '
        import socket, os
        port = int(os.environ["UDP_ECHO_PORT"])
        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        s.bind(("0.0.0.0", port))
        while True:
            data, addr = s.recvfrom(65535)
            s.sendto(data, addr)
        '
    networks:
      udp2raw-compare:
        ipv4_address: 100.64.240.10

  udp2raw-server:
    build:
      context: .
      dockerfile: Dockerfile.udp2raw
    image: udp2raw-compare:latest
    container_name: udp2raw-compare-server
    depends_on:
      - udp-echo
    # udp2raw uses raw sockets and, with `-a`, installs iptables rules to block
    # the kernel from RSTing its FakeTCP stream — so both capabilities are
    # required.
    cap_add: [NET_ADMIN, NET_RAW]
    command:
      - udp2raw
      - -s
      - -l
      - "0.0.0.0:${PHANTUN_TCP_PORT:-4567}"
      - -r
      - "100.64.240.10:${UDP_ECHO_PORT:-5000}"
      - -k
      - "${PHANTUN_KEY:-compare-harness-local}"
      - --raw-mode
      - faketcp
      - -a
    networks:
      udp2raw-compare:
        ipv4_address: 100.64.240.20

  udp2raw-client:
    image: udp2raw-compare:latest
    container_name: udp2raw-compare-client
    depends_on:
      udp2raw-server:
        condition: service_started
    cap_add: [NET_ADMIN, NET_RAW]
    # udp2raw-client is eager: it initiates the fake-TCP handshake the moment
    # the binary starts. phantun-client is lazy (waits for first UDP packet),
    # so phantun's SYN/SYN-ACK naturally fall inside the capture window. To
    # keep the comparison symmetric we hold the binary back a bit, giving the
    # capturer sidecar time to attach to this container's netns and open its
    # tcpdump socket before the handshake fires.
    command:
      - sh
      - -c
      - |
        sleep 2
        exec udp2raw -c \
          -l "0.0.0.0:${PHANTUN_LOCAL_UDP:-4500}" \
          -r "100.64.240.20:${PHANTUN_TCP_PORT:-4567}" \
          -k "${PHANTUN_KEY:-compare-harness-local}" \
          --raw-mode faketcp -a
    networks:
      udp2raw-compare:
        ipv4_address: 100.64.240.30

  capturer:
    build:
      context: .
      dockerfile: Dockerfile.capturer
    image: phantun-compare-capturer:latest
    container_name: udp2raw-compare-capturer
    depends_on:
      udp2raw-client:
        condition: service_started
    network_mode: "container:udp2raw-compare-client"
    cap_add: [NET_ADMIN, NET_RAW]
    stop_grace_period: 8s
    volumes:
      - ./captures:/captures
    command:
      - -c
      - |
        set -eu
        : > /captures/udp2raw.txt
        : > /captures/udp2raw-udp.txt
        tcpdump -i eth0 -s 0 -B 16384 -U -w /captures/udp2raw.pcap "tcp and port ${PHANTUN_TCP_PORT:-4567}" &
        TCP_PID=$$!
        tcpdump -i eth0 -s 0 -B 16384 -U -w /captures/udp2raw-udp.pcap "udp and port ${PHANTUN_LOCAL_UDP:-4500}" &
        UDP_PID=$$!
        finish() {
          kill -TERM $$TCP_PID $$UDP_PID 2>/dev/null || true
          wait $$TCP_PID 2>/dev/null || true
          wait $$UDP_PID 2>/dev/null || true
          tcpdump -r /captures/udp2raw.pcap -nn -tt -S -e -v > /captures/udp2raw.txt 2>/dev/null || true
          tcpdump -r /captures/udp2raw-udp.pcap -nn -tt -S -e -v > /captures/udp2raw-udp.txt 2>/dev/null || true
          exit 0
        }
        trap finish TERM INT
        wait

  # UDP replay generator. Replays ./awg-replay.jsonl — a captured AmneziaWG
  # client-side UDP stream (see scripts/extract-replay.py) — preserving real
  # packet sizes and inter-arrival timing. Identical to the phantun side so
  # both stacks see the same input.
  generator:
    image: python:3.12-alpine
    container_name: udp2raw-compare-generator
    depends_on:
      capturer:
        condition: service_started
    entrypoint: []
    environment:
      TARGET_HOST: "100.64.240.30"
      TARGET_PORT: "${PHANTUN_LOCAL_UDP:-4500}"
      STARTUP_DELAY_S: "3"
    volumes:
      - ./awg-replay.jsonl:/replay.jsonl:ro
    command:
      - sh
      - -c
      - |
        sleep "$$STARTUP_DELAY_S"
        exec python3 -u -c '
        import os, socket, time, json
        host = os.environ["TARGET_HOST"]
        port = int(os.environ["TARGET_PORT"])
        with open("/replay.jsonl") as fh:
            steps = [json.loads(l) for l in fh if l.strip()]
        sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        base = time.monotonic()
        sent = 0
        sent_bytes = 0
        for step in steps:
            target = base + step["t_ms"]/1000.0
            dt = target - time.monotonic()
            if dt > 0:
                time.sleep(dt)
            sock.sendto(bytes(step["len"]), (host, port))
            sent += 1
            sent_bytes += step["len"]
        dur = steps[-1]["t_ms"]/1000.0 if steps else 0.0
        print(f"generator: replayed {sent} packets ({sent_bytes}B payload) "
              f"over {dur:.2f}s")
        '
    networks:
      udp2raw-compare:
        ipv4_address: 100.64.240.40

networks:
  udp2raw-compare:
    name: udp2raw-compare
    driver: bridge
    ipam:
      config:
        - subnet: "${BRIDGE_SUBNET:-100.64.240.0/24}"
