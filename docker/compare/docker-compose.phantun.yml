# Local compare harness — phantun side.
# See docs/plans/20260416-local-compare-harness.md.
#
# Usage:
#   docker compose -f docker/compare/docker-compose.phantun.yml up --build \
#     --abort-on-container-exit --exit-code-from generator || true
#
# All values below have inline defaults, but can be overridden via the
# environment for debugging.

name: phantun-compare

services:
  # Python UDP echo: strict one-in / one-out via SOCK_DGRAM. Replaced socat+cat
  # because socat's pipe-to-cat path can merge back-to-back UDP datagrams under
  # tight timing (observed 220B = 110+110 or 78+142 in DN captures), which broke
  # size-based pairing in docs/packet-compare.html.
  udp-echo:
    image: python:3.12-alpine
    container_name: phantun-compare-udp-echo
    environment:
      UDP_ECHO_PORT: "${UDP_ECHO_PORT:-5000}"
    command:
      - sh
      - -c
      - |
        exec python3 -u -c '
        import socket, os
        port = int(os.environ["UDP_ECHO_PORT"])
        s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        s.bind(("0.0.0.0", port))
        while True:
            data, addr = s.recvfrom(65535)
            s.sendto(data, addr)
        '
    networks:
      phantun-compare:
        ipv4_address: 100.64.240.10

  # Phantun server. Before launching the binary we set up the iptables/sysctl
  # rules phantun's README requires:
  #   - IPv4 forwarding on (the phantun TUN interface is on a separate subnet)
  #   - DNAT incoming TCP dport 4567 on eth0 to phantun's TUN IP (192.168.201.2)
  #     so the kernel doesn't RST the FakeTCP packets before they reach phantun.
  phantun-server:
    build:
      context: ../..
      dockerfile: docker/compare/Dockerfile.phantun
    image: phantun-compare:latest
    container_name: phantun-compare-server
    depends_on:
      - udp-echo
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    # /proc/sys/net/ipv4/ip_forward is read-only inside a container by default;
    # the `sysctls:` key tells dockerd to set it at container creation.
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      RUST_LOG: info
      PHANTUN_TCP_PORT: "${PHANTUN_TCP_PORT:-4567}"
      UDP_ECHO_PORT: "${UDP_ECHO_PORT:-5000}"
      PHANTUN_KEY: "${PHANTUN_KEY:-compare-harness-local}"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu
        iptables -t nat -A PREROUTING -p tcp -i eth0 --dport "$$PHANTUN_TCP_PORT" \
          -j DNAT --to-destination 192.168.201.2
        exec phantun-server \
          --local "$$PHANTUN_TCP_PORT" \
          --remote "100.64.240.10:$$UDP_ECHO_PORT" \
          --key "$$PHANTUN_KEY" \
          --ipv4-only
    networks:
      phantun-compare:
        ipv4_address: 100.64.240.20

  # Phantun client. Same story as the server side:
  #   - IPv4 forwarding on
  #   - MASQUERADE on eth0 so TUN-side (192.168.200.x) source IPs are rewritten
  #     to the container's bridge IP on egress.
  phantun-client:
    image: phantun-compare:latest
    container_name: phantun-compare-client
    depends_on:
      phantun-server:
        condition: service_started
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      RUST_LOG: info
      PHANTUN_LOCAL_UDP: "${PHANTUN_LOCAL_UDP:-4500}"
      PHANTUN_TCP_PORT: "${PHANTUN_TCP_PORT:-4567}"
      PHANTUN_KEY: "${PHANTUN_KEY:-compare-harness-local}"
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu
        iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
        exec phantun-client \
          --local "0.0.0.0:$$PHANTUN_LOCAL_UDP" \
          --remote "100.64.240.20:$$PHANTUN_TCP_PORT" \
          --key "$$PHANTUN_KEY" \
          --ipv4-only
    networks:
      phantun-compare:
        ipv4_address: 100.64.240.30

  capturer:
    build:
      context: .
      dockerfile: Dockerfile.capturer
    image: phantun-compare-capturer:latest
    container_name: phantun-compare-capturer
    depends_on:
      phantun-client:
        condition: service_started
    network_mode: "container:phantun-compare-client"
    cap_add: [NET_ADMIN, NET_RAW]
    stop_grace_period: 8s
    volumes:
      - ./captures:/captures
    command:
      - -c
      - |
        set -eu
        : > /captures/phantun.txt
        : > /captures/phantun-udp.txt
        tcpdump -i eth0 -s 0 -B 16384 -U -w /captures/phantun.pcap "tcp and port ${PHANTUN_TCP_PORT:-4567}" &
        TCP_PID=$$!
        tcpdump -i eth0 -s 0 -B 16384 -U -w /captures/phantun-udp.pcap "udp and port ${PHANTUN_LOCAL_UDP:-4500}" &
        UDP_PID=$$!
        finish() {
          kill -TERM $$TCP_PID $$UDP_PID 2>/dev/null || true
          wait $$TCP_PID 2>/dev/null || true
          wait $$UDP_PID 2>/dev/null || true
          tcpdump -r /captures/phantun.pcap -nn -tt -S -e -v > /captures/phantun.txt 2>/dev/null || true
          tcpdump -r /captures/phantun-udp.pcap -nn -tt -S -e -v > /captures/phantun-udp.txt 2>/dev/null || true
          exit 0
        }
        trap finish TERM INT
        wait

  # UDP replay generator. Replays ./awg-replay.jsonl — a captured AmneziaWG
  # client-side UDP stream (see scripts/extract-replay.py) — preserving real
  # packet sizes and inter-arrival timing. Gives us realistic variable-size
  # input instead of a synthetic constant-rate stream.
  generator:
    image: python:3.12-alpine
    container_name: phantun-compare-generator
    depends_on:
      capturer:
        condition: service_started
    entrypoint: []
    environment:
      TARGET_HOST: "100.64.240.30"
      TARGET_PORT: "${PHANTUN_LOCAL_UDP:-4500}"
      STARTUP_DELAY_S: "3"
    volumes:
      - ./awg-replay.jsonl:/replay.jsonl:ro
    command:
      - sh
      - -c
      - |
        sleep "$$STARTUP_DELAY_S"
        exec python3 -u -c '
        import os, socket, time, json
        host = os.environ["TARGET_HOST"]
        port = int(os.environ["TARGET_PORT"])
        with open("/replay.jsonl") as fh:
            steps = [json.loads(l) for l in fh if l.strip()]
        sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
        base = time.monotonic()
        sent = 0
        sent_bytes = 0
        for step in steps:
            target = base + step["t_ms"]/1000.0
            dt = target - time.monotonic()
            if dt > 0:
                time.sleep(dt)
            sock.sendto(bytes(step["len"]), (host, port))
            sent += 1
            sent_bytes += step["len"]
        dur = steps[-1]["t_ms"]/1000.0 if steps else 0.0
        print(f"generator: replayed {sent} packets ({sent_bytes}B payload) "
              f"over {dur:.2f}s")
        '
    networks:
      phantun-compare:
        ipv4_address: 100.64.240.40

networks:
  phantun-compare:
    name: phantun-compare
    driver: bridge
    ipam:
      config:
        - subnet: "${BRIDGE_SUBNET:-100.64.240.0/24}"
